<!DOCTYPE html>
<html>
<head>
    <title>Generate Favicon</title>
</head>
<body>
    <h1>Generate Favicon</h1>
    <p>Right-click the image below and save as favicon.ico</p>
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" width="32" height="32">
        <circle cx="20" cy="20" r="18" fill="none" stroke="#4ade80" stroke-width="2.5" />
        <circle cx="20" cy="20" r="5" fill="#4ade80" />
        <line x1="20" y1="2" x2="20" y2="10" stroke="#4ade80" stroke-width="2.5" stroke-linecap="round" />
        <line x1="20" y1="30" x2="20" y2="38" stroke="#4ade80" stroke-width="2.5" stroke-linecap="round" />
        <line x1="2" y1="20" x2="10" y2="20" stroke="#4ade80" stroke-width="2.5" stroke-linecap="round" />
        <line x1="30" y1="20" x2="38" y2="20" stroke="#4ade80" stroke-width="2.5" stroke-linecap="round" />
    </svg>
</body>
</html>
